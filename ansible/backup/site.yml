---
# Playbook principal — Déploiement BorgBackup AIRSOLID (VM203)
# Usage:
#   ansible-playbook -i inventory/hosts.yml site.yml
#   ansible-playbook -i inventory/hosts.yml site.yml --tags borg_server
#   ansible-playbook -i inventory/hosts.yml site.yml --tags borg_client

- name: Configuration du serveur de backup (VM203 — airsolid-backup-pra)
  hosts: backup_server
  become: true
  gather_facts: true
  roles:
    - role: borg_server
      tags: borg_server

- name: Configuration des clients BorgBackup (VM201, VM202)
  hosts: backup_clients
  become: true
  gather_facts: true
  roles:
    - role: borg_client
      tags: borg_client
