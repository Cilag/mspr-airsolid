---
# ──────────────────────────────────────────────────────────────
# Role: samba_addc — Install Samba 4 AD/DC on Debian 12
# Domain: airsolid.local | Role: Primary DC | DNS: SAMBA_INTERNAL
# ──────────────────────────────────────────────────────────────

- name: Set system hostname
  hostname:
    name: "{{ dc_hostname }}"

- name: Ensure hostname resolves to AD IP in /etc/hosts
  lineinfile:
    path: /etc/hosts
    regexp: "^{{ dc_ip_vmbr99 }}"
    line: "{{ dc_ip_vmbr99 }}  {{ dc_hostname }}.airsolid.local {{ dc_hostname }}"
    state: present

- name: Preseed krb5-config debconf answers (non-interactive install)
  debconf:
    name: krb5-config
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: string
  loop:
    - { question: "krb5/default_realm",  value: "{{ samba_realm }}" }
    - { question: "krb5/kdc_servers",    value: "{{ dc_hostname }}.airsolid.local" }
    - { question: "krb5/admin_server",   value: "{{ dc_hostname }}.airsolid.local" }

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Samba AD/DC packages
  apt:
    name:
      - samba
      - winbind
      - krb5-config
      - krb5-user
      - samba-common-bin
      - acl
      - attr
      - net-tools
      - dnsutils
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Stop and disable SMB/NMB/Winbind (incompatible with samba-ad-dc)
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  failed_when: false
  loop:
    - smbd
    - nmbd
    - winbind

- name: Back up default smb.conf
  copy:
    src: /etc/samba/smb.conf
    dest: /etc/samba/smb.conf.dist
    remote_src: yes
    force: no
  failed_when: false

- name: Remove smb.conf so domain provision generates a fresh one
  file:
    path: /etc/samba/smb.conf
    state: absent

- name: Provision Samba AD domain (idempotent via creates)
  command: >
    samba-tool domain provision
    --use-rfc2307
    --realm={{ samba_realm }}
    --domain={{ samba_domain }}
    --server-role={{ samba_server_role }}
    --dns-backend={{ samba_dns_backend }}
    --adminpass={{ samba_adminpass }}
  args:
    creates: /etc/samba/smb.conf
  register: provision_result

- name: Copy Kerberos config generated by Samba provision
  copy:
    src: /var/lib/samba/private/krb5.conf
    dest: /etc/krb5.conf
    remote_src: yes
    backup: yes

- name: Unmask samba-ad-dc (masked by default on Debian)
  command: systemctl unmask samba-ad-dc
  changed_when: false
  failed_when: false

- name: Enable and start samba-ad-dc service
  systemd:
    name: samba-ad-dc
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for Samba AD to be ready (port 389 = LDAP)
  wait_for:
    host: "{{ dc_ip_vmbr99 }}"
    port: 389
    timeout: 60
    state: started

- name: Ensure systemd-resolved drop-in directory exists
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: '0755'

- name: Disable systemd-resolved DNS stub (conflicts with Samba DNS on IPv4 port 53)
  copy:
    content: |
      [Resolve]
      DNSStubListener=no
    dest: /etc/systemd/resolved.conf.d/no-stub.conf
    mode: '0644'
  notify: restart systemd-resolved

- name: Flush handlers to restart systemd-resolved before Samba DNS binds
  meta: flush_handlers

- name: Restart samba-ad-dc after DNS stub disabled
  systemd:
    name: samba-ad-dc
    state: restarted
    daemon_reload: yes

- name: Wait for Samba DNS port 53 on AD IP
  wait_for:
    host: "{{ dc_ip_vmbr99 }}"
    port: 53
    timeout: 30
    state: started

- name: Set resolv.conf to Samba DNS (immutable to prevent cloud-init overwrites)
  copy:
    content: |
      domain airsolid.local
      search airsolid.local
      nameserver 127.0.0.1
    dest: /etc/resolv.conf

- name: Make /etc/resolv.conf immutable
  command: chattr +i /etc/resolv.conf
  changed_when: false
  failed_when: false

- name: Verify Samba AD domain info
  command: samba-tool domain info 127.0.0.1
  register: domain_info
  changed_when: false

- name: Show AD domain info
  debug:
    msg: "{{ domain_info.stdout_lines }}"

- name: List AD users (sanity check)
  command: samba-tool user list
  register: user_list
  changed_when: false

- name: Show AD users
  debug:
    msg: "{{ user_list.stdout_lines }}"

- name: Verify LDAP SRV record in Samba DNS
  command: host -t SRV _ldap._tcp.airsolid.local 127.0.0.1
  register: dns_check
  changed_when: false

- name: Show DNS SRV check result
  debug:
    msg: "{{ dns_check.stdout }}"
