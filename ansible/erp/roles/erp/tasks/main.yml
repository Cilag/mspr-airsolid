---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker CE and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: ansible
    groups: docker
    append: true

- name: Create ERP directory
  ansible.builtin.file:
    path: /opt/erp
    state: directory
    owner: root
    group: docker
    mode: "0775"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/erp/docker-compose.yml
    mode: "0640"
  notify: Restart ERP stack

- name: Write .env file with secrets
  ansible.builtin.copy:
    dest: /opt/erp/.env
    mode: "0600"
    owner: root
    group: root
    content: |
      POSTGRES_PASSWORD={{ postgres_password }}

- name: Pull ERP images
  community.docker.docker_compose_v2_pull:
    project_src: /opt/erp

- name: Start ERP stack
  community.docker.docker_compose_v2:
    project_src: /opt/erp
    state: present
    pull: missing

- name: Wait for Odoo to be reachable (200 or 500 both mean Odoo is up; 500 is normal before DB init)
  ansible.builtin.uri:
    url: http://localhost:8069/web/health
    method: GET
    status_code: [200, 500]
  register: _odoo_health
  retries: 20
  delay: 10
  until: _odoo_health.status in [200, 500]
