---
- name: Create ERP deploy directory
  ansible.builtin.file:
    path: "{{ erp_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create ERP config directory
  ansible.builtin.file:
    path: "{{ erp_deploy_dir }}/config"
    state: directory
    mode: "0755"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ erp_deploy_dir }}/docker-compose.yml"
    mode: "0644"

- name: Copy odoo.conf
  ansible.builtin.copy:
    src: odoo.conf
    dest: "{{ erp_deploy_dir }}/config/odoo.conf"
    mode: "0644"

- name: Write .env file with postgres password
  ansible.builtin.copy:
    dest: "{{ erp_deploy_dir }}/.env"
    content: "POSTGRES_PASSWORD={{ postgres_password }}\n"
    mode: "0600"

- name: Install systemd unit for ERP stack
  ansible.builtin.template:
    src: erp.service.j2
    dest: /etc/systemd/system/erp.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start ERP service
  ansible.builtin.systemd:
    name: erp
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Odoo port 8069
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 8069
    timeout: 120
    delay: 10
